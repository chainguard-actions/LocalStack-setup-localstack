name: Test skip-startup mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with skip-startup
        id: action
        uses: .
        with:
          image-tag: latest
          install-awslocal: 'true'
          skip-startup: 'true'
      - name: Assert awslocal is installed
        run: |
          echo "Checking if awslocal CLI is installed..."
          if ! command -v awslocal &> /dev/null; then
            echo "FAIL: awslocal CLI was not installed"
            exit 1
          fi
          echo "PASS: awslocal CLI is installed"
          awslocal --version
