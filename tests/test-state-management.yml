name: Test state management inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with state-save inputs
        id: action
        uses: .
        with:
          image-tag: latest
          install-awslocal: 'false'
          skip-startup: 'true'
          state-action: 'save'
          state-backend: 'cloud-pods'
          state-name: 'my-test-pod'
      - name: Assert action completed
        run: |
          echo "PASS: action completed with state-management inputs provided"
